
networks:
  backend:
    external: true

services:
  helldivers2armorer:
    image: registry.gitlab.lan:5050/jhr/helldivers2armorer:latest
    pull_policy: always
    stdin_open: true
    tty: true
    # ports:
    #   - 8080:80/tcp
    networks:
      - backend
    labels:
      - my.domain=hd2armorer.lan
      - traefik.enable=true
      - traefik.http.routers.hd2armorer.tls=true

      - traefik.http.routers.hd2armorer.service=hd2armorer_svc
      - traefik.http.services.hd2armorer_svc.loadbalancer.server.port=80
      - traefik.http.services.hd2armorer_svc.loadbalancer.server.scheme=http

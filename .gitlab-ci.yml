stages:
  - version
  - build
  - e2e
  - release
  - deploy

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  NUGET_XMLDOC_MODE: "skip"
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"
  # GitVersion needs full history to compute semantic version
  GIT_DEPTH: "0"
  # Playwright browsers pre-installed in the playwright/dotnet image at /ms-playwright
  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
  # GitHub Pages sub-path — must match GitHub repo name
  PAGES_BASE_HREF: /helldivers2armorer/

# ── Shared Playwright job template ────────────────────────────────────────
.playwright:
  image:
    name: mcr.microsoft.com/playwright/dotnet:v1.59.0-noble
    pull_policy: if-not-present
  cache:
    key: e2e-$CI_COMMIT_SHA
    paths:
      - e2e-publish/
    policy: pull

# ── Calculate semantic version ────────────────────────────────────────────
version:
  stage: version
  interruptible: true
  image:
    name: mcr.microsoft.com/dotnet/sdk:10.0
    pull_policy: if-not-present
  script:
    - dotnet tool restore
    - SEMVER=$(dotnet gitversion /showvariable SemVer)
    - echo "Calculated version ${SEMVER}"
    - echo "GITVERSION_SEMVER=${SEMVER}" > version.env
  artifacts:
    reports:
      dotenv: version.env

# ── Build & publish ───────────────────────────────────────────────────────
build:
  stage: build
  interruptible: true
  image:
    name: mcr.microsoft.com/dotnet/sdk:10.0
    pull_policy: if-not-present
  needs:
    - job: version
      artifacts: true
  script:
    - dotnet restore Helldivers2Armorer.slnx
    - dotnet tool restore
    - dotnet gitversion /updateprojectfiles
    - echo "Building version ${GITVERSION_SEMVER}"
    - dotnet slopwatch analyze -d . --output json --fail-on error
    - dotnet build Helldivers2Armorer.slnx --configuration Release --no-restore
    # Publish WASM app once (base href="/") — used for Docker and as E2E test target
    # Note: --no-build is intentionally absent; fingerprint substitution in index.html
    # requires the full publish pipeline (OverrideHtmlAssetPlaceholders targets won't
    # run with --no-build, leaving #[.{fingerprint}] literals that 404 in the browser).
    - dotnet publish Helldivers2Armorer/Helldivers2Armorer.csproj --configuration Release --no-restore --output publish/
    # Copy output for GitHub Pages and fix base href to match the sub-path
    - cp -r publish/ pages-publish/
    - |
      sed -i "s|<base href=\"/\" />|<base href=\"${PAGES_BASE_HREF}\" />|" \
        pages-publish/wwwroot/index.html
    # E2E self-contained linux-x64 publish (bundles runtime — no dotnet in playwright image)
    - dotnet publish Helldivers2Armorer.E2E/Helldivers2Armorer.E2E.csproj --configuration Release -r linux-x64 --self-contained --output e2e-publish/
    # Copy wwwroot alongside the E2E binary so AppFixture can locate static files
    - cp -r publish/wwwroot e2e-publish/wwwroot
  cache:
    - key: nuget-$CI_COMMIT_REF_SLUG
      paths:
        - .nuget/packages/
    - key: e2e-$CI_COMMIT_SHA
      paths:
        - e2e-publish/
      policy: push
  artifacts:
    name: "helldivers2armorer-$GITVERSION_SEMVER"
    paths:
      - publish/
      - pages-publish/
    expire_in: 30 days

# ── E2E browser tests (pre-deploy, static file host) ─────────────────────
e2e:
  extends: .playwright
  stage: e2e
  interruptible: true
  script:
    - chmod +x e2e-publish/Helldivers2Armorer.E2E
    - ./e2e-publish/Helldivers2Armorer.E2E
  needs:
    - job: build
      artifacts: false

# ── Tag the release commit ───────────────────────────────────────────────
tag-release:
  stage: release
  interruptible: false
  image:
    name: alpine/git:latest
    entrypoint: [""]
    pull_policy: if-not-present
  needs:
    - job: e2e
      artifacts: false
    - job: version
      artifacts: true
  script:
    - git config --global user.email "ci@gitlab.lan"
    - git config --global user.name "GitLab CI"
    - git config --global http.sslVerify false
    - git tag -f "v${GITVERSION_SEMVER}" -m "Release v${GITVERSION_SEMVER}"
    - git push --force "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "refs/tags/v${GITVERSION_SEMVER}"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Deploy static output to gh-pages branch ──────────────────────────────
# GitLab server-side mirroring pushes gh-pages → GitHub, which GitHub Pages serves.
# Note: if the GitLab mirror is configured to mirror only named branches, ensure
# gh-pages is included (Settings → Repository → Mirroring).
pages:
  stage: release
  interruptible: false
  image:
    name: alpine/git:latest
    entrypoint: [""]
    pull_policy: if-not-present
  needs:
    - job: e2e
      artifacts: false
    - job: build
      artifacts: true
    - job: version
      artifacts: true
  script:
    - git config --global user.email "ci@gitlab.lan"
    - git config --global user.name "GitLab CI"
    - git config --global http.sslVerify false
    - cd pages-publish/wwwroot
    - touch .nojekyll
    - git init
    - git checkout -b gh-pages
    - git add .
    - git commit -m "Deploy v${GITVERSION_SEMVER} [skip ci]"
    - git remote add origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
    - git push --force origin gh-pages
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Docker image for homelab ──────────────────────────────────────────────
docker:
  stage: release
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  needs:
    - job: e2e
      artifacts: false
    - job: build
      artifacts: true
    - job: version
      artifacts: true
  script:
    - docker build -f Dockerfile -t $IMAGE_NAME:$CI_COMMIT_SHA publish/wwwroot
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:$GITVERSION_SEMVER
    - docker push $IMAGE_NAME:$GITVERSION_SEMVER
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:latest
    - docker push $IMAGE_NAME:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# ── Deploy via Portainer webhook ──────────────────────────────────────────
# PORTAINER_WEBHOOK_URL stored in GitLab CI/CD variables (Settings → CI/CD → Variables)
# ?tag= tells Portainer to pull that specific tag — commit SHA guarantees a fresh pull.
deploy:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - |
      if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
        echo "PORTAINER_WEBHOOK_URL not set — skipping."
        exit 0
      fi
      echo "Triggering Portainer redeploy with tag $CI_COMMIT_SHA..."
      HTTP_CODE=$(curl --insecure --silent --max-time 30 \
        --write-out "%{http_code} %{time_total}s" --output /tmp/portainer_response.txt \
        -X POST "${PORTAINER_WEBHOOK_URL}?tag=${CI_COMMIT_SHA}")
      echo "HTTP status: $HTTP_CODE"
      echo "Response: $(cat /tmp/portainer_response.txt)"
      if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
        echo "Portainer returned HTTP $HTTP_CODE"
        exit 1
      fi
      echo "Portainer notified."
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - job: docker
